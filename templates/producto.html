{% extends "base.html" %}
{% block content %}
<h1>{{ p["nombre"] }}</h1>
{% if p['imagen_url'] %}
<img class="product-image" src="{{ url_for('descargar_imagen', filename=p['imagen_url']) }}" alt="{{ p['nombre'] }}">
{% else %}
<div class="product-image product-image--placeholder">Sin imagen</div>
{% endif %}
<p>{{ p["descripcion"] or "" }}</p>
<p><strong>Precio:</strong> ${{ "%.2f"|format(p["precio"]) }}</p>
<p><strong>Stock:</strong> {{ p["stock"] }}</p>

<form method="post" action="{{ url_for('carrito_agregar') }}">
    <input type="hidden" name="producto_id" value="{{ p['id'] }}">
    <input class="qty" type="number" name="cantidad" min="1" value="1">
    <button class="btn primary" type="submit">Agregar al carrito</button>
</form>
<form method="post" action="{{ url_for('carrito_agregar') }}" style="margin-top: 10px;">
    <input type="hidden" name="producto_id" value="{{ p['id'] }}">
    <input type="hidden" name="cantidad" value="1">
    <input type="hidden" name="redirect_to" value="carrito">
    <button class="btn" type="submit">Comprar ahora</button>
</form>
{% endblock %}
