{% extends "base.html" %}
{% block content %}
<h1>Nuevo producto</h1>

<form method="post" class="card form-card">
    <label>
        Nombre
        <input type="text" name="nombre" required>
    </label>

    <label>
        Descripción
        <textarea name="descripcion" rows="3"></textarea>
    </label>

    <label>
        Nombre de imagen en carpeta imagenes
        <input type="text" name="imagen_url" placeholder="foto-producto.jpg">
    </label>

    <label>
        Precio
        <input type="number" name="precio" min="0" step="0.01" required>
    </label>

    <label>
        Costo
        <input type="number" name="costo" min="0" step="0.01" value="0" required>
    </label>

    <label>
        Stock
        <input type="number" name="stock" min="0" step="1" value="0" required>
    </label>

    <div class="row">
        <button class="btn primary" type="submit">Crear producto</button>
        <a class="btn" href="{{ url_for('admin_productos') }}">Cancelar</a>
    </div>
</form>
{% endblock %}
