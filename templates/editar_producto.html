{% extends "base.html" %}
{% block content %}
<h1>Editar producto: {{ p['nombre'] }}</h1>

<form method="post" class="card form-card">
    <label>
        Nombre
        <input type="text" name="nombre" value="{{ p['nombre'] }}" required>
    </label>

    <label>
        Descripción
        <textarea name="descripcion" rows="3">{{ p['descripcion'] or '' }}</textarea>
    </label>

    <label>
        Nombre de imagen en carpeta imagenes
        <input type="text" name="imagen_url" value="{{ p['imagen_url'] or '' }}" placeholder="foto-producto.jpg">
    </label>

    <label>
        Precio
        <input type="number" name="precio" min="0" step="0.01" value="{{ p['precio'] }}" required>
    </label>

    <label>
        Costo
        <input type="number" name="costo" min="0" step="0.01" value="{{ p['costo'] or 0 }}" required>
    </label>

    <label>
        Stock
        <input type="number" name="stock" min="0" step="1" value="{{ p['stock'] }}" required>
    </label>

    <div class="row">
        <button class="btn primary" type="submit">Guardar cambios</button>
        <a class="btn" href="{{ url_for('admin_productos') }}">Cancelar</a>
    </div>
</form>
{% endblock %}
